name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-hf-space
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Git Xet
        run: |
          sudo apt-get update
          sudo apt-get install -y git-lfs
          curl --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/huggingface/xet-core/refs/heads/main/git_xet/install.sh | sh
          git xet install
          git xet --version

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Missing HF_TOKEN secret."
            exit 1
          fi

          rsync -a \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "__pycache__" \
            --exclude "pipeline/__pycache__" \
            --exclude "assets/images" \
            --exclude "assets/videos" \
            ./ /tmp/hf-space/

          cd /tmp/hf-space
          git init
          git checkout -b main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy Space snapshot"
          git push --force "https://lolita-malaeva:${HF_TOKEN}@huggingface.co/spaces/lolita-malaeva/people-flow-analyzer" main
